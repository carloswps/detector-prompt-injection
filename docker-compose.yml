services:
  db:
    image: postgres:15-alpine
    container_name: shieldprompt-db
    environment:
      POSTGRES_USER: user_shield
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shield_audit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: